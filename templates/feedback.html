<!DOCTYPE html>
<html>
<head>
<title>Exam Feedback</title>

<style>

body{
    font-family:Arial;
    background:#f4f6f9;
}

.card{
    width:600px;
    margin:50px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

textarea{
    width:100%;
    height:120px;
    padding:10px;
}

button{
    background:#27ae60;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<h2>⭐ Exam Feedback</h2>

<form method="POST">

<p>Rate this Exam:</p>

<select name="rating" required>

<option value="5">★★★★★</option>
<option value="4">★★★★</option>
<option value="3">★★★</option>
<option value="2">★★</option>
<option value="1">★</option>

</select>

<br><br>

<textarea
name="comments"
placeholder="Share your feedback..."
></textarea>

<br><br>

<button type="submit">
Submit Feedback
</button>

</form>

</div>

</body>
</html>
