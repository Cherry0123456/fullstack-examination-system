<!DOCTYPE html>
<html>
<head>

<title>Student Profile</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
}

.navbar{
    background:#2c3e50;
    color:white;
    padding:20px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
}

.container{
    width:90%;
    max-width:1000px;
    margin:30px auto;
}

.profile-card{
    background:white;
    padding:30px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.avatar{
    width:100px;
    height:100px;
    border-radius:50%;
    background:#3498db;
    color:white;
    font-size:40px;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:auto;
    margin-bottom:15px;
}

.name{
    font-size:28px;
    font-weight:bold;
    margin-bottom:5px;
}

.email{
    color:#777;
    margin-bottom:20px;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-top:30px;
}

.stat-card{
    background:white;
    padding:25px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.stat-card h3{
    color:#555;
    margin-bottom:10px;
}

.stat-card p{
    font-size:32px;
    font-weight:bold;
    color:#3498db;
}

.back-btn{
    display:inline-block;
    margin-top:25px;
    background:#27ae60;
    color:white;
    text-decoration:none;
    padding:12px 20px;
    border-radius:8px;
}

.back-btn:hover{
    background:#219150;
}

</style>

</head>

<body>

<div class="navbar">
    Student Profile
</div>

<div class="container">

    <div class="profile-card">

        <div class="avatar">
            {{ student[0][0] }}
        </div>

        <div class="name">
            {{ student[0] }}
        </div>

        <div class="email">
            {{ student[1] }}
        </div>

    </div>

    <div class="stats">

        <div class="stat-card">
            <h3>Total Exams</h3>
            <p>{{ total_exams }}</p>
        </div>

        <div class="stat-card">
            <h3>Average Score</h3>
            <p>{{ avg_percentage }}%</p>
        </div>

        <div class="stat-card">
            <h3>Best Score</h3>
            <p>{{ best_score }}%</p>
        </div>

        <div class="stat-card">
            <h3>Certificates</h3>
            <p>{{ certificates }}</p>
        </div>

    </div>

    <center>

        <a href="{{ url_for('student_dashboard') }}"
           class="back-btn">

           ← Back to Dashboard

        </a>

    </center>

</div>

</body>
</html>
