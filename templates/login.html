<!DOCTYPE html>

<html>
<head>
    <title>Student Login</title>

<style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial,sans-serif;
    }

    body{
        background:linear-gradient(135deg,#3498db,#2c3e50);
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
    }

    .login-container{
        background:white;
        width:400px;
        padding:40px;
        border-radius:15px;
        box-shadow:0px 5px 20px rgba(0,0,0,0.2);
    }

    h2{
        text-align:center;
        margin-bottom:25px;
        color:#2c3e50;
    }

    label{
        display:block;
        margin-top:15px;
        margin-bottom:5px;
        font-weight:bold;
    }

    input{
        width:100%;
        padding:12px;
        border:1px solid #ccc;
        border-radius:8px;
    }

    button{
        width:100%;
        padding:12px;
        background:#3498db;
        color:white;
        border:none;
        border-radius:8px;
        margin-top:25px;
        cursor:pointer;
        font-size:16px;
    }

    button:hover{
        background:#2980b9;
    }

    .error{
        color:red;
        text-align:center;
        margin-top:10px;
    }

    .links{
        text-align:center;
        margin-top:20px;
    }

    .links a{
        text-decoration:none;
        color:#3498db;
        font-weight:bold;
    }

</style>


</head>

<body>

<div class="login-container">

<h2>Student Login</h2>

<form method="POST">

    <label>Email</label>
    <input type="email"
           name="email"
           required>

    <label>Password</label>
    <input type="password"
           name="password"
           required>

    <button type="submit">
        Login
    </button>

</form>

{% if error %}
<div class="error">
    {{ error }}
</div>
{% endif %}

<div class="links">

    <a href="{{ url_for('register') }}">
        Create New Account
    </a>

    <br><br>

    <a href="{{ url_for('home') }}">
        ← Back to Home
    </a>

</div>

</div>

</body>
</html>
